<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBI Style Notice (Fictional)</title>

<style>
:root{
    --navy:#003366;
    --blue:#0057b8;
    --light:#f5f8fc;
    --border:#d9e2ef;
    --text:#1a1a1a;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#fff;
    color:var(--text);
    padding:16px;
}

.notice{
    max-width:700px;
    margin:auto;
    border:1px solid var(--border);
    background:#fff;
}

.header{
    background:var(--navy);
    color:#fff;
    padding:18px;
    text-align:center;
}

.header h1{
    font-size:32px;
    letter-spacing:1px;
    font-weight:700;
}

.header p{
    margin-top:4px;
    font-size:14px;
    opacity:.9;
}

.content{
    padding:24px;
}

.photo{
    display:flex;
    justify-content:center;
    margin-bottom:24px;
}

.photo img{
    width:100%;
    max-width:300px;
    border:2px solid #222;
    display:block;
}

.section{
    margin-bottom:18px;
}

.label{
    font-size:12px;
    color:#666;
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:4px;
}

.value{
    font-size:28px;
    font-weight:700;
    color:var(--navy);
}

.summary{
    background:var(--light);
    border-left:4px solid var(--blue);
    padding:14px;
    line-height:1.6;
}

.footer{
    border-top:1px solid var(--border);
    padding:14px 24px;
    font-size:13px;
    color:#555;
}

@media (max-width:600px){
    .content{
        padding:16px;
    }

    .value{
        font-size:24px;
    }

    .header h1{
        font-size:26px;
    }
}
</style>
</head>
<body>

<div class="notice">

    <div class="header">
        <h1>WANTED</h1>
        <p>Investigative Notice</p>
    </div>

    <div class="content">

        <div class="photo">
            <img src="e.png" alt="John Doe">
        </div>

        <div class="section">
            <div class="label">Name</div>
            <div class="value">Jeemilson Nolasco</div>
        </div>

        <div class="section">
            <div class="label">Case Summary</div>
            <div class="summary">
              Subject allegedly connected to the possession
                of approximately <strong>20 terabytes of family photographs</strong>.
                Information is being sought regarding the origin,
                organization, and storage of the files.
            </div>
        </div>

    </div>

    <div class="footer">
        Date Last Seen: June 15 2026
    </div>

</div>

</body>
</html>

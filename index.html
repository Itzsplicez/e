<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Store</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff;text-align:center}
h1{margin-top:30px}
.wrap{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:40px}
.card{background:#1c1c1c;width:220px;padding:20px;border-radius:10px}
.price{font-size:22px;margin:10px 0}
button{padding:10px;width:100%;border:none;border-radius:8px;background:purple;color:#fff;cursor:pointer}
</style>
</head>
<body>

<h1>My Store</h1>

<div class="wrap">

<div class="card">
<h2>Package 1</h2>
<p>Edit description</p>
<div class="price">$1.99</div>
<button onclick="buy(1.99)">Buy</button>
</div>

<div class="card">
<h2>Package 2</h2>
<p>Edit description</p>
<div class="price">$2.99</div>
<button onclick="buy(2.99)">Buy</button>
</div>

<div class="card">
<h2>Package 3</h2>
<p>Edit description</p>
<div class="price">$3.99</div>
<button onclick="buy(3.99)">Buy</button>
</div>

</div>

<script>
async function buy(amount){
const r = await fetch("/create-order", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount})
});

const d = await r.json();

await fetch("/capture-order", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({orderID:d.id})
});

alert("Payment successful");
}
</script>

</body>
</html>
